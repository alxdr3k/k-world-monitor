# Tier A source seed — k-world-monitor v0
# Q-021 resolved (user accepted 2026-05-12)
# 72 sources × 4 meta-categories (economy/policy/society/pop_culture)
# AC-027 distribution: risk_observer 19% ≤50% / opportunity_observer 29% ≥25% / neutral 42% ≥15% ✓
# Canonical location: data/sources_seed.yaml (this repo)
# Import: INFRA-1B.1 seedSources() — bootstraps SQLite source_material_policy
#         + source_registry_slug_map (slug → source_id with `src_<ULID>` value
#         format, stable mapping, DEC-015).
#         This YAML is the bootstrap input for the 2-store Source Registry seam;
#         Neo4j Source nodes are NOT created here AND **are not auto-created by
#         the discovery worker** — `src/discovery/worker/snapshot-fingerprint.ts`
#         P1-3 guard throws when a Source node is missing (Codex round 2 P1
#         review). Operators must bootstrap Neo4j Source nodes via a follow-up
#         slice (INFRA-1B.2+ 안 미등록) or manual Cypher before running discovery.
#         See docs/02_HLD.md Components 표 "Source Registry (Neo4j ↔ SQLite
#         2-store seam)" + docs/current/DATA_MODEL.md "Source Registry —
#         2-store logical seam" section for the full composition / bootstrap
#         order / FK seam contract.
# collectability_score initial values — subject to revision after first collection run
#
# Fields:
#   slug:                  human-readable key (used for deduplication at import)
#   name:                  display name
#   publisher:             publishing organization
#   url:                   homepage or primary endpoint (RSS/API URL in rss_url / api_base)
#   rss_url:               RSS/Atom feed URL (verify during INFRA-1B.1 if marked "verify")
#   api_base:              API base URL (API key config in INFRA-1B.1)
#   access_method:         api | rss
#   reliability_tier:      0=Tier A
#   source_perspective:    risk_observer | opportunity_observer | neutral | mixed
#   meta_category:         economy | policy | society | pop_culture
#   subtopic_tags:         list
#   collectability:        automation_reliability, legal_policy_clarity, anti_bot_friction, preferred_mode
#   archive_policy:        full_snapshot_allowed | excerpt_only | metadata_only | do_not_collect
#   raw_cloud_policy:      always_prohibited (ADR-0012 universal)
#   external_llm_policy:   allowed | manual_review_required | prohibited
#   notes:                 operational notes

