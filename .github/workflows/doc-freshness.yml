# Doc Freshness — soft warning for thin-doc / roadmap / gate / CI-doc drift.
#
# Adapted from boilerplate skeleton (.github/workflows/doc-freshness.yml.example)
# for the k-world-monitor stack:
# - SRC_DIR        = `src/`
# - MIGRATIONS_DIR = `migrations/`
# - GENERATE_COMMAND = none — schema is committed directly under `migrations/`
#   so DATA_MODEL.md must be hand-updated when migrations change.
#
# Never blocks merges (advisory). Activated by DEC-020 Q-048 resolution.
#
# Untrusted GitHub event input (pull_request.base.ref) flows only via env:.

name: Doc Freshness

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # PR-only enforcement per DEC-020 Q-048. main push is blocked by branch
  # protection — no push trigger needed.

permissions:
  contents: read
  pull-requests: write
  # PR comments use the issues.createComment / updateComment / listComments
  # endpoints (GitHub API special-cases PR as a kind of issue), so issues:write
  # is required even though we only comment on pull_request events. Without it,
  # the github-script step silently fails with 403 — combined with
  # `continue-on-error: true` on the comment step, the workflow appears green
  # while dropping the advisory signal (Codex P2 review on PR #32 2026-05-14).
  issues: write

jobs:
  check:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed paths vs base
        id: diff
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$PR_BASE_REF"
          CHANGED=$(git diff --name-only "origin/${PR_BASE_REF}...HEAD")
          {
            echo "changed<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect doc-touching code changes
        id: detect
        env:
          CHANGED: ${{ steps.diff.outputs.changed }}
        run: |
          set -euo pipefail
          missing=()

          touched_src=$(printf '%s\n' "$CHANGED" | grep -E '^src/' || true)
          touched_migrations=$(printf '%s\n' "$CHANGED" | grep -E '^migrations/' || true)
          touched_scripts=$(printf '%s\n' "$CHANGED" | grep -E '^scripts/' || true)
          touched_tests=$(printf '%s\n' "$CHANGED" | grep -E '^tests/' || true)

          touched_testing_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/current/TESTING\.md$' || true)
          touched_operations_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/current/OPERATIONS\.md$' || true)
          touched_data_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/current/DATA_MODEL\.md$' || true)
          touched_codemap_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/current/CODE_MAP\.md$' || true)
          touched_roadmap_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/04_IMPLEMENTATION_PLAN\.md$' || true)
          touched_current_state=$(printf '%s\n' "$CHANGED" | grep -E '^docs/context/current-state\.md$' || true)
          touched_acceptance_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/06_ACCEPTANCE_TESTS\.md$' || true)
          touched_runbook=$(printf '%s\n' "$CHANGED" | grep -E '^docs/05_RUNBOOK\.md$' || true)
          touched_ci_cd_doc=$(printf '%s\n' "$CHANGED" | grep -E '^docs/11_CI_CD\.md$' || true)
          touched_adr=$(printf '%s\n' "$CHANGED" | grep -E '^docs/adr/' || true)
          touched_workflows=$(printf '%s\n' "$CHANGED" | grep -E '^\.github/workflows/.*\.ya?ml(\.example)?$' || true)

          if { [ -n "$touched_src" ] || [ -n "$touched_scripts" ]; } &&
             [ -z "$touched_codemap_doc" ] &&
             [ -z "$touched_roadmap_doc" ] &&
             [ -z "$touched_current_state" ] &&
             [ -z "$touched_acceptance_doc" ] &&
             [ -z "$touched_adr" ]; then
            missing+=("Source/script changed → update \`docs/current/CODE_MAP.md\` (file inventory + Last verified SHA), \`docs/04_IMPLEMENTATION_PLAN.md\` (slice status/evidence), \`docs/context/current-state.md\` (active position), \`docs/06_ACCEPTANCE_TESTS.md\` (gate changes), or add an ADR.")
          fi

          if [ -n "$touched_tests" ] &&
             [ -z "$touched_testing_doc" ] &&
             [ -z "$touched_acceptance_doc" ]; then
            missing+=("Tests changed → update \`docs/current/TESTING.md\` (test file inventory + counts + Last verified SHA) and \`docs/06_ACCEPTANCE_TESTS.md\` (TEST-### location if a planned TEST landed).")
          fi

          if [ -n "$touched_migrations" ] && [ -z "$touched_data_doc" ] && [ -z "$touched_adr" ]; then
            missing+=("Migrations changed → update \`docs/current/DATA_MODEL.md\` (new tables/columns + version list) and add an ADR if the schema decision is architectural.")
          fi

          if [ -n "$touched_workflows" ] &&
             [ -z "$touched_testing_doc" ] &&
             [ -z "$touched_operations_doc" ] &&
             [ -z "$touched_runbook" ] &&
             [ -z "$touched_ci_cd_doc" ] &&
             [ -z "$touched_acceptance_doc" ] &&
             [ -z "$touched_adr" ]; then
            missing+=("Workflow files changed → update \`docs/current/TESTING.md\` (CI workflow table), \`docs/11_CI_CD.md\`, \`docs/05_RUNBOOK.md\`, \`docs/06_ACCEPTANCE_TESTS.md\`, or add an ADR if CI/CD behavior changed.")
          fi

          if [ ${#missing[@]} -eq 0 ]; then
            echo "missing=" >> "$GITHUB_OUTPUT"
          else
            {
              echo "missing<<EOF"
              for m in "${missing[@]}"; do
                echo "- $m"
              done
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR if docs may be stale
        # Skip on forked PRs and Dependabot — GITHUB_TOKEN is read-only on
        # those events, so issues.createComment/updateComment raises
        # "Resource not accessible by integration" and turns this advisory
        # step into a failing job (Codex P2 review on PR #32, 2026-05-13).
        # Additionally use continue-on-error as defense-in-depth: even if a
        # future workflow change re-enables this on fork events, a comment
        # failure must never block merge for a soft-warning workflow.
        if: >
          steps.detect.outputs.missing != '' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.event.pull_request.user.login != 'dependabot[bot]'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          MISSING: ${{ steps.detect.outputs.missing }}
        with:
          script: |
            const missing = process.env.MISSING || '';
            const marker = '<!-- doc-freshness-check -->';
            const body = [
              marker,
              '### Doc freshness check',
              '',
              'Changes were detected that may require thin-doc, roadmap/status, gate, CI/CD-doc, or ADR updates per AGENTS.md "When changing code".',
              '',
              missing,
              '',
              'Policy: `AGENTS.md` "When changing code". This comment is automated — soft warning, never blocks merge. If the change is intentional, ack in the PR description and proceed.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
