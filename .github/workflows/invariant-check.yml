# Cross-document invariant validator (warning-level only).
#
# Copy to `.github/workflows/invariant-check.yml` to activate.
# Boilerplate-owned. See docs/adr/0002-invariant-tracking-system.md.
#
# Runs `scripts/validate_invariants.ts --ci` and emits GitHub annotations.
# Never hard-fails (validator exits 0 unconditionally) — annotations only.
# CI mode does NOT modify doc frontmatter; only foreground LLM runs use
# `--write-warnings` to persist `unresolved_warnings[]` into Q/DEC/ADR.

name: invariant-check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'docs/**'
      - 'scripts/validate_invariants.ts'
      - 'scripts/lib/**'
      # Round 56: include the fixture harness + install inputs.
      # The harness itself is the only blocking regression check
      # (live repo validation is warning-level by design — INV-0002-1).
      # If the path filter omits it, a PR that touches only
      # test_fixture.sh / package.json / bun.lock can avoid this
      # workflow entirely and weaken the detector unnoticed.
      - 'scripts/test_fixture.sh'
      - 'package.json'
      - 'bun.lock'
      - 'docs/templates/relation_enum*.yaml'
      - 'docs/templates/glossary_term_schema*.yaml'
      # Round 65: include the workflow file itself. A PR editing only
      # `.github/workflows/invariant-check.yml` (the active copy) or
      # the boilerplate `.example` template could otherwise remove the
      # blocking fixture step or weaken validator invocation without
      # this workflow ever running. The enforcement boundary must
      # exercise itself when modified.
      - '.github/workflows/invariant-check.yml'
      - '.github/workflows/invariant-check.yml.example'
      # Round 68: include AGENTS.policy.md. The invariant tracking
      # authoring obligations (read docs/_generated/ before authoring,
      # use term_effects[] for term changes, etc.) live in the policy
      # file. A PR weakening or removing those obligations must run
      # the regression workflow so reviewers see the effect.
      - 'AGENTS.policy.md'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/validate_invariants.ts'
      - 'scripts/lib/**'
      - 'scripts/test_fixture.sh'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/invariant-check.yml'
      - '.github/workflows/invariant-check.yml.example'
      - 'AGENTS.policy.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: invariant-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Round 77: pin to a tested major. `latest` would pull a moving
          # target — a future Bun release could change parser/runtime
          # behavior and break validation/fixture comparison without any
          # change in the consuming repo. Adopters should bump this
          # alongside fixture verification when upgrading Bun.
          bun-version: '1.3'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate artifacts (read-only modes do not write)
        # Round 61: --ci is strictly read-only — it does NOT bootstrap-
        # write docs/_generated. Run --regenerate FIRST so the artifacts
        # exist when --ci runs (otherwise --ci emits a noisy
        # WARN-BOOTSTRAP-artifacts_missing on every fresh CI checkout
        # since the .yaml files are gitignored).
        run: bun run scripts/validate_invariants.ts --regenerate

      - name: Run invariant validator
        # warning level only — exits 0. annotations are emitted to stdout.
        run: bun run scripts/validate_invariants.ts --ci

      - name: Run fixture regression tests
        # BLOCKING. Live repo validation is warning-level (INV-0002-1)
        # by design, but the fixture tests are the only check that
        # actually fails when the detector itself regresses. Round 48:
        # invoke the harness directly so this workflow is self-contained
        # — adopter package.json is not required to expose
        # `invariant:fixtures` for CI to work.
        run: |
          set -euo pipefail
          bash scripts/test_fixture.sh docs/_examples/scope_creep
          bash scripts/test_fixture.sh docs/_examples/glossary_drift

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invariant-generated-${{ github.run_id }}
          path: docs/_generated/
          if-no-files-found: ignore
          retention-days: 7
